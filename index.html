<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>YouTube Search Premium</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                fontFamily: {
                    "headline-md": ["Space Grotesk"],
                    "label-sm": ["Inter"],
                    "label-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-lg": ["Space Grotesk"],
                    "headline-xl": ["Space Grotesk"],
                    "body-md": ["Inter"],
                    "body-sm": ["Inter"]
                }
            }
        }
    }
</script>
<style>
    body {
        background-color: #101418;
        color: #e0e2e9;
        -webkit-font-smoothing: antialiased;
        min-height: max(884px, 100dvh);
    }
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
        background: #101418;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #444C56;
        border-radius: 10px;
    }
    /* Simple loader spinner */
    .loader {
      border: 4px solid #1F2328;
      border-top: 4px solid #2F81F7;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 40px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
</style>
</head>
<body class="font-body-md text-body-md selection:bg-[#2F81F7]/30 pl-20 md:pl-0">

<!-- Desktop Navigation Rail -->
<aside class="fixed left-0 top-0 h-full w-20 bg-[#1F2328] border-r border-[#444C56] hidden md:flex flex-col items-center py-6 gap-8 z-40">
    <div class="mt-2 mb-4">
        <span class="material-symbols-outlined text-[#2F81F7] text-3xl">smart_display</span>
    </div>
    <div class="flex flex-col items-center gap-1 group cursor-pointer text-[#2F81F7]">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">home</span>
        <span class="text-[10px] font-medium font-['Space_Grotesk']">Home</span>
    </div>
    <div class="flex flex-col items-center gap-1 group cursor-pointer text-gray-400 hover:text-white transition-colors">
        <span class="material-symbols-outlined">explore</span>
        <span class="text-[10px] font-medium font-['Space_Grotesk']">Explore</span>
    </div>
    <div class="flex flex-col items-center gap-1 group cursor-pointer text-gray-400 hover:text-white transition-colors">
        <span class="material-symbols-outlined">subscriptions</span>
        <span class="text-[10px] font-medium font-['Space_Grotesk']">Subs</span>
    </div>
    <div class="flex flex-col items-center gap-1 group cursor-pointer text-gray-400 hover:text-white transition-colors">
        <span class="material-symbols-outlined">video_library</span>
        <span class="text-[10px] font-medium font-['Space_Grotesk']">Library</span>
    </div>
</aside>

<!-- TopAppBar -->
<header class="bg-[#1F2328]/80 backdrop-blur-xl docked full-width top-0 z-30 border-b border-[#444C56] flex justify-between items-center px-4 h-16 w-full fixed md:pl-24">
    <div class="flex items-center gap-4">
        <button class="md:hidden hover:bg-[#2D333B] transition-colors duration-200 p-2 rounded-full active:scale-95">
            <span class="material-symbols-outlined text-gray-400">menu</span>
        </button>
        <h1 class="text-xl font-bold tracking-tighter text-white font-['Space_Grotesk']">Premium Search</h1>
    </div>

    <!-- Search Form -->
    <div class="hidden md:flex flex-1 max-w-2xl px-8">
        <form id="search-form" class="relative w-full">
            <input id="search-query" class="w-full bg-[#101418] border border-[#444C56] rounded-full py-2 px-6 focus:outline-none focus:border-[#2F81F7] focus:ring-1 focus:ring-[#2F81F7]/20 transition-all font-body-sm" placeholder="Search YouTube content..." type="text"/>
            <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-white">
                <span class="material-symbols-outlined">search</span>
            </button>
        </form>
    </div>

    <div class="flex items-center gap-2">
        <button class="md:hidden hover:bg-[#2D333B] transition-colors duration-200 p-2 rounded-full active:scale-95" onclick="document.getElementById('search-query').focus()">
            <span class="material-symbols-outlined text-gray-400">search</span>
        </button>
        <div class="w-8 h-8 rounded-full overflow-hidden border border-[#444C56] ml-2">
            <img alt="User Profile" src="https://ui-avatars.com/api/?name=Biz+Growth&background=2F81F7&color=fff"/>
        </div>
    </div>
</header>

<!-- Main Content Area -->
<main class="pt-24 pb-20 md:pb-8 px-4 md:px-8 max-w-[1440px] mx-auto min-h-screen md:ml-20">
    
    <!-- Category & Filters -->
    <section class="flex flex-wrap gap-4 pb-8 items-center border-b border-[#444C56] mb-8">
        <div class="flex flex-col">
            <label for="month-year" class="text-xs text-gray-400 mb-1 font-['Space_Grotesk']">Published After</label>
            <input type="month" id="month-year" class="bg-[#2D333B] border border-[#444C56] text-white text-sm rounded-lg focus:ring-[#2F81F7] focus:border-[#2F81F7] block p-2">
        </div>

        <div class="flex flex-col">
            <label for="primary-sort" class="text-xs text-gray-400 mb-1 font-['Space_Grotesk']">Primary Sort</label>
            <select id="primary-sort" class="bg-[#2D333B] border border-[#444C56] text-white text-sm rounded-lg focus:ring-[#2F81F7] focus:border-[#2F81F7] block p-2">
                <option value="relevance">Relevance</option>
                <option value="date">Upload Date</option>
                <option value="rating">Highest Rating</option>
            </select>
        </div>

        <div class="flex flex-col">
            <label for="secondary-sort" class="text-xs text-[#2F81F7] mb-1 font-['Space_Grotesk']">Secondary Rank</label>
            <select id="secondary-sort" class="bg-[#2D333B] border border-[#2F81F7]/50 text-white text-sm rounded-lg focus:ring-[#2F81F7] focus:border-[#2F81F7] block p-2">
                <option value="none">None</option>
                <option value="mostViewed">Most Viewed</option>
                <option value="newest">Newest First</option>
            </select>
        </div>
    </section>

    <!-- Error Message -->
    <div id="error-message" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-lg mb-6"></div>

    <!-- Loader -->
    <div id="loader" class="hidden loader"></div>

    <!-- Bento Grid Video Feed -->
    <div id="results-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Results will be dynamically injected here by main.js -->
    </div>
</main>

<script type="module" src="/main.js"></script>
</body>
</html>
